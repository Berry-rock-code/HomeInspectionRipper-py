name: Deploy to Cloud Run

on: workflow_dispatch

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Run tests before deploy
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pytest tests/ -v

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Ensure Artifact Registry repository exists
        run: |
          if ! gcloud artifacts repositories describe inspection \
               --location=us-central1 \
               --project=${{ secrets.GCP_PROJECT_ID }} \
               --quiet 2>/dev/null; then
            gcloud artifacts repositories create inspection \
              --repository-format=docker \
              --location=us-central1 \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --description="Inspection server Docker images"
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/inspection/inspection-server:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy inspection-server \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --image=${{ env.IMAGE }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --timeout=300s \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars GROK_API_KEY=${{ secrets.GROK_API_KEY }}

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe inspection-server \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service deployed at: $SERVICE_URL"
          for attempt in $(seq 1 10); do
            echo "Health check attempt $attempt/10..."
            if curl -fsS "$SERVICE_URL/health"; then
              echo ""
              echo "Health check passed."
              exit 0
            fi
            sleep 6
          done
          echo "Health check failed. Recent logs:"
          gcloud run services logs read inspection-server \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --limit=20 || true
          exit 1

      - name: Post deployment summary
        if: success()
        run: |
          SERVICE_URL=$(gcloud run services describe inspection-server \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "Deployed: $SERVICE_URL"
          echo "Next: set this URL as the Named Credential 'InspectionServer' in your Salesforce org."
